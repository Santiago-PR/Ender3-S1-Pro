[gcode_macro START_PRINT]
description: Inicio optimizado producción Ender 3 S1 Pro
gcode:

    ########################################################
    # 1. Leer temperaturas enviadas desde Orca
    ########################################################
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(205)|float %}

    M117 Iniciando impresion...

    ########################################################
    # 2. Comenzar calentamiento en paralelo (ahorra tiempo)
    ########################################################
    M140 S{BED_TEMP}          ; cama empieza a calentar
    M104 S150                ; nozzle solo a 150°C anti-goteo

    ########################################################
    # 3. Home completo
    ########################################################
    G90
    M83
    G28

    ########################################################
    # 4. Esperar cama estable antes del mesh
    ########################################################
    M190 S{BED_TEMP}

    ########################################################
    # 5. Mesh adaptativo SOLO zona de impresión
    ########################################################
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1

    ########################################################
    # 6. Ahora sí calentar nozzle final
    ########################################################
    M104 S{EXTRUDER_TEMP}
    M109 S{EXTRUDER_TEMP}

    ########################################################
    # 7. Reset extrusor
    ########################################################
    G92 E0

    ########################################################
    # 8. Línea de purga segura fija frontal izquierda
    ########################################################
    G1 Z3 F3000              ; subir seguridad
    G1 X5 Y5 F5000          ; esquina segura
    G1 Z0.28 F1200          ; altura primera capa

    ; Primera línea de carga
    G1 Y120 E14 F1200

    ; Segunda línea fina de limpieza
    G1 X7 F5000
    G1 Y20 E4 F1200

    ########################################################
    # 9. Anti goteo y salida limpia
    ########################################################
    G92 E0
    G1 E-0.25 F1800
    G1 Z0.6 F3000
    G1 X15 Y15 F5000

    ########################################################
    # 10. Listo
    ########################################################
    M117 Imprimiendo...

[gcode_macro END_PRINT]
description: Finalización segura para piezas altas
gcode:

    M117 Finalizando impresión...

    #################################################
    # 1. Retracción pequeña para evitar goteo
    #################################################
    M83
    G1 E-2 F1800
    G4 P300

    #################################################
    # 2. Guardar posición actual Z
    #################################################
    {% set current_z = printer.toolhead.position.z %}
    {% set max_z = printer.toolhead.axis_maximum.z %}

    #################################################
    # 3. Subir solo si hay espacio disponible
    #################################################
    G91
    {% if current_z < (max_z - 5) %}
        G1 Z5 F1200
    {% endif %}
    G90

    #################################################
    # 4. Retirar cabezal en XY sin tocar Z
    #################################################
    G1 X10 Y220 F6000

    #################################################
    # 5. Apagar temperaturas
    #################################################
    M104 S0
    M140 S0
    M107

    #################################################
    # 6. Liberar motores
    #################################################
    M84

    #################################################
    # 7. Aviso final
    #################################################
    finTelegram
    M117 Impresión finalizada

#########################################################################################

[gcode_macro CambioColorTelegram]
gcode:
  RESPOND PREFIX=tgnotify MSG="/Cambio de color necesito tu ayuda"

[gcode_macro finTelegram]
gcode:
  RESPOND PREFIX=tgnotify MSG="/Terminó la impresión"
  
