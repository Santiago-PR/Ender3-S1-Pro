[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(70)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
  
    M117 Iniciando impresión...

    # 🔥 Calentamiento en paralelo
    M140 S{BED_TEMP}
    M104 S{EXTRUDER_TEMP}

    G90
    M83          ; extrusor en relativo
    SET_GCODE_OFFSET Z=0.0

    G28

    # 🧠 Mientras calienta, haces el mesh
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1

    # ⏱ Esperas al final (optimizado)
    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP}

    G1 Z5 F3000

    M117 ¡Listo para imprimir!

[gcode_macro END_PRINT]
description: Finalización optimizada y segura de impresión
gcode:
    M117 Finalizando impresión...

    # 🧼 Retracción controlada (evita hilos)
    M83
    G1 E-2 F1800

    # ⏱ Pequeña pausa para estabilizar presión
    G4 P500

    # 📏 Elevar nozzle para evitar rayar la pieza
    G91
    G1 Z10 F3000

    # 🧭 Volver a coordenadas absolutas
    G90

    # 📦 Mover cama al frente (mejor acceso a la pieza)
    G1 X10 Y220 F6000

    # 🔥 Apagar hotend primero (seguridad)
    M104 S0

    # 🛏 Luego apagar cama
    M140 S0

    # 🌀 Apagar ventiladores
    M107

    # Subida adicional absoluta (opcional pero recomendado)
    G1 Z100 F3000

    # 🔔 Beep de notificación (si tu board lo soporta)
    M300 S1000 P300
    G4 P200
    M300 S1500 P300

    # 🔌 Liberar motores
    M84
    finTelegram
    M117 Impresión finalizada

#########################################################################################

[gcode_macro CambioColorTelegram]
gcode:
  RESPOND PREFIX=tgnotify MSG="/Cambio de color necesito tu ayuda"

[gcode_macro finTelegram]
gcode:
  RESPOND PREFIX=tgnotify MSG="/Terminó la impresión"
  
