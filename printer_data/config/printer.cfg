# This file contains pin mappings for the stock 2022 Creality Ender 3
# S1 Plus. To use this config check the STM32 Chip on the Mainboard,
# during "make menuconfig" select accordingly either the
# STM32F103 with "28KiB bootloader" or the STM32F401 with
# "64KiB bootloader" and serial (on USART1 PA10/PA9) for both.

# For a direct serial connection, in "make menuconfig" select
# "Enable extra low-level configuration options" and  Serial
# (on USART2 PA3/PA2), which is on the 10 pin IDC cable used
# for the LCD module as follows: 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The filename
# must be changed to "firmware.bin"

# With STM32F401, you might need to put "firmware.bin" in a
# folder on the SD card called "STM32F4_UPDATE" in order to flash.

# See docs/Config_Reference.md for a description of parameters.

[include macros.cfg]
[include mainsail.cfg]
[exclude_object]
#[include adxl.cfg] solo quitar comentaria cuando quiera calibrar el imputshaper(vibraciones)

[delayed_gcode autohome]
initial_duration: 1.0
gcode:
  G28
  
[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA5
position_endstop: -8
position_max: 225   # 235 para nivelar los tornillos
position_min: -8
homing_speed: 80

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA6
position_endstop: -4
position_max: 225 # 250 para nivelar los tornillos
position_min: -4
homing_speed: 80

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 267
position_min: -5

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
gear_ratio: 42:12
rotation_distance: 25.42
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
#control: pid
#pid_kp = 21.269
#pid_ki = 1.233
#pid_kd = 91.722
min_temp: 0
max_temp: 300
max_extrude_only_distance: 150
max_extrude_cross_section: 2.5

[heater_bed]
heater_pin: PA7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_kp = 72.420
#pid_ki = 1.557
#pid_kd = 841.886
min_temp: 0
max_temp: 130

[heater_fan hotend_fan]
pin: PC0

[fan]
pin: PA0

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 4500
max_z_velocity: 25
max_z_accel: 100

[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -33
y_offset: -40.5
z_offset = 4.174
samples: 2
speed: 2
pin_move_time: 0.700
probe_with_touch_mode: true
stow_on_each_sample: false

[bed_mesh]
speed: 180
horizontal_move_z: 5
mesh_min: 20, 20
mesh_max: 172, 164.5
probe_count: 5,5
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
adaptive_margin: 5

[safe_z_home]
home_xy_position: 112, 112 # centro de la cama
speed: 150
z_hop: 25
z_hop_speed: 10

[filament_switch_sensor e0_sensor]
switch_pin: !PC15
pause_on_runout: true
runout_gcode: PAUSE

[pause_resume]
recover_velocity: 25

[screws_tilt_adjust]

# Coordenadas de los tornillos de la cama (posición del PROBE, no del nozzle)
screw1: 56,71
screw1_name: front left screw

screw2: 231,71
screw2_name: front right screw

screw3: 231,248
screw3_name: rear right screw

screw4: 56,248
screw4_name: rear left screw

# Altura a la que se mueve el cabezal entre mediciones (evita choques)
horizontal_move_z: 10

# Velocidad de desplazamiento entre tornillos (mm/s)
speed: 100

# Tipo de rosca de los tornillos:
# CW = clockwise (sentido horario aprieta)
# M4 = tipo de tornillo
screw_thread: CW-M4

